<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Near-black canvas with hairline border -->
  <rect width="32" height="32" rx="6" fill="#0e0f0c"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.5" fill="none" stroke="#9fe870" stroke-opacity="0.35"/>

  <!-- Pixel G in lime green -->
  <g fill="#9fe870">
    <!-- top bar -->
    <rect x="9" y="7" width="14" height="3"/>
    <!-- left column -->
    <rect x="7" y="7" width="3" height="18"/>
    <!-- bottom bar -->
    <rect x="9" y="22" width="14" height="3"/>
    <!-- right column (lower half) -->
    <rect x="20" y="14" width="3" height="11"/>
    <!-- mid bar (G crossbar) -->
    <rect x="15" y="14" width="6" height="3"/>
  </g>

  <!-- A single pixel "cursor" dot (terminal feel) -->
  <rect x="25" y="25" width="2" height="2" fill="#cdffad"/>
</svg>
